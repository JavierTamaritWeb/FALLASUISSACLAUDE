    <div class="calendario-eventos modo-sencillo" id="calendarioContenedor">
      <div class="calendario-eventos__acciones">
        <button class="calendario-eventos__boton-quitar" id="botonQuitarFiltros" data-i18n="calendario.quitar" aria-label="Limpiar todos los filtros del calendario" tabindex="0">Quitar Filtros (Alt+R)</button>
        <button class="calendario-eventos__modo-boton" id="botonModo" data-i18n="calendario.avanzado" aria-label="Cambiar entre modo sencillo y avanzado" aria-pressed="false" tabindex="0">Cambiar a Modo Avanzado</button>
        <!-- Botón para alternar Modo Oscuro -->
        <!-- <button class="calendario-eventos__modo-boton" id="botonModoOscuro">Modo Oscuro</button> -->
       
      </div>
     
      <div class="calendario-eventos__controles">
        <div class="calendario-eventos__fila fila-basica">
          <div class="calendario-eventos__control">
            <label for="filtro-busqueda" data-i18n="calendario.buscar">Buscar</label>
            <input type="text" id="filtro-busqueda" class="calendario-eventos__control-busqueda" placeholder="Palabras clave">
          </div>
          <div class="calendario-eventos__control">
            <label for="filtro-rango-fecha" data-i18n="calendario.rango">Rango de fechas</label>
            <div class="calendario-eventos__control-fecha-wrapper">
              <input type="text" id="filtro-rango-fecha" class="calendario-eventos__control-fecha" placeholder="dd-mm-aaaa a dd-mm-aaaa"  required>
              <button id="borrar-rango-fecha" class="calendario-eventos__control-fecha-borrar">✕</button>
            </div>
          </div>
          <div class="calendario-eventos__control">
            <label for="filtro-categoria" data-i18n="calendario.categorias">Categoría</label>
            <select id="filtro-categoria" class="calendario-eventos__control-texto">
              <option value="" data-i18n="calendario.todas">Todas</option>
              <option value="Festivo" data-i18n="calendario.festivo">Festivo</option>
              <option value="Falla" data-i18n="calendario.falla">Falla</option>
              <option value="Evento" data-i18n="calendario.evento">Evento</option>
              <option value="Urgente" data-i18n="calendario.urgente">Urgente</option>
              <option value="Informacion" data-i18n="calendario.informacion">Informacion</option>
              <option value="Recordatorio" data-i18n="calendario.recordatorio">Recordatorio</option>
            </select>
          </div>
        </div>
        <div class="calendario-eventos__fila fila-avanzada avanzado">
          <div class="calendario-eventos__control">
            <label for="filtro-fecha" data-i18n="calendario.puntual">Fecha puntual</label>
            <div class="calendario-eventos__control-fecha-wrapper">
              <input type="date" id="filtro-fecha" class="calendario-eventos__control-fecha" placeholder="dd-mm-aaaa">
              <button id="borrar-fecha" class="calendario-eventos__control-fecha-borrar">✕</button>
            </div>
          </div>
        </div>
        <div class="calendario-eventos__fila fila-avanzada avanzado">
          <div class="calendario-eventos__control">
            <label for="filtro-dia" data-i18n="calendario.dia">Día (2 dígitos)</label>
            <div class="calendario-eventos__campo-wrapper">
              <input type="text" id="filtro-dia" class="calendario-eventos__control-texto" placeholder="DD" maxlength="2" pattern="^\\d{1,2}$" inputmode="numeric" title="Día entre 01 y 31">
              <button class="calendario-eventos__borrar-campo" id="borrar-dia">✕</button>
            </div>
          </div>
          <div class="calendario-eventos__control">
            <label for="filtro-mes" data-i18n="calendario.mes">Mes (2 dígitos)</label>
            <div class="calendario-eventos__campo-wrapper">
              <input type="text" id="filtro-mes" class="calendario-eventos__control-texto" placeholder="MM" maxlength="2" pattern="^\\d{1,2}$" inputmode="numeric" title="Mes entre 01 y 12">
              <button class="calendario-eventos__borrar-campo" id="borrar-mes">✕</button>
            </div>
          </div>
          <div class="calendario-eventos__control">
            <label for="filtro-ano" data-i18n="calendario.anno">Año (4 dígitos)</label>
            <div class="calendario-eventos__campo-wrapper">
              <input type="text" id="filtro-ano" class="calendario-eventos__control-texto" placeholder="AAAA" maxlength="4" pattern="^\\d{4}$" inputmode="numeric" title="Introduzca 4 dígitos (p.ej. 2025)">
              <button class="calendario-eventos__borrar-campo" id="borrar-ano">✕</button>
            </div>
          </div>
        </div>
      </div>
      <div class="calendario-eventos__leyenda" id="info-mes"></div>
      <div class="calendario-eventos__mini" id="mini-calendario"></div>
      <!-- <div class="calendario-eventos__detalles-mes" id="descripcion-eventos-mes"></div>
      <div class="calendario-eventos__lista" id="lista-anuncios"></div> -->
          <!-- Contenedor para el encabezado con detalles del mes -->

      <!-- Contenedor para la lista de tarjetas de eventos -->
      <div class="calendario-eventos__lista" id="lista-anuncios" data-i18n="calendario.listaAnuncios"></div>

    </div>

  <!-- Modal ICS -->
  <div id="icsModal" class="ics-modal oculto">
    <div class="ics-modal__contenido">
      <button class="ics-modal__cerrar" id="icsCerrarBtn">×</button>
      <h2 id="icsModalTitulo" class="ics-modal__titulo" data-i18n="icsModal.titulo">Día {date} ({dayName})</h2>
      <label for="icsEvento" class="ics-modal__label" data-i18n="icsModal.evento">Evento</label>
      <!-- <input type="text" id="icsEvento" class="ics-modal__input" value=""> -->
      <input type="text" id="icsEvento" class="ics-modal__input" data-i18n-placeholder="icsModal.placeholderEvento" placeholder="Introduzca el título del evento">
      <label for="icsHoraInicio" class="ics-modal__label" data-i18n="icsModal.horaInicial">Hora inicial</label>
      <input type="time" id="icsHoraInicio" class="ics-modal__input" value="00:00">
      <label for="icsHoraFin" class="ics-modal__label" data-i18n="icsModal.horaFinal">Hora final</label>
      <input type="time" id="icsHoraFin" class="ics-modal__input" value="23:59">
      <label for="icsNotas" class="ics-modal__label" data-i18n="icsModal.notas">Notas</label>
      <textarea id="icsNotas" class="ics-modal__textarea" data-i18n-placeholder="icsModal.placeholderNotas" placeholder="Introduzca sus notas"></textarea>
      <button id="icsAceptarBtn" class="ics-modal__boton" data-i18n="icsModal.aceptar">ACEPTAR</button>
    </div>
  </div>
