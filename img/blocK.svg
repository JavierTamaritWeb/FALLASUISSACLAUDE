<svg
  width="128"
  height="128"
  viewBox="0 0 128 128"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Tapas del bloc de notas -->
  <rect
    x="20"
    y="20"
    width="88"
    height="88"
    rx="10"
    ry="10"
    fill="#F17266"
    stroke="#000000"
    stroke-width="2"
  />

  <!-- Espiral del bloc de notas -->
  <circle cx="28" cy="30" r="4" fill="#FFFFFF" />
  <circle cx="28" cy="40" r="4" fill="#FFFFFF" />
  <circle cx="28" cy="50" r="4" fill="#FFFFFF" />
  <circle cx="28" cy="60" r="4" fill="#FFFFFF" />
  <circle cx="28" cy="70" r="4" fill="#FFFFFF" />
  <circle cx="28" cy="80" r="4" fill="#FFFFFF" />

  <!-- Líneas del bloc de notas -->
  <line x1="40" y1="30" x2="100" y2="30" stroke="#FFFFFF" stroke-width="2" />
  <line x1="40" y1="40" x2="100" y2="40" stroke="#FFFFFF" stroke-width="2" />
  <line x1="40" y1="50" x2="100" y2="50" stroke="#FFFFFF" stroke-width="2" />
  <line x1="40" y1="60" x2="100" y2="60" stroke="#FFFFFF" stroke-width="2" />
  <line x1="40" y1="70" x2="100" y2="70" stroke="#FFFFFF" stroke-width="2" />
  <line x1="40" y1="80" x2="100" y2="80" stroke="#FFFFFF" stroke-width="2" />
  <line x1="40" y1="90" x2="100" y2="90" stroke="#FFFFFF" stroke-width="2" />
</svg>